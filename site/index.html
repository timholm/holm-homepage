<style>
:root {
  --bg: #0e1014;
  --panel: #161922;
  --panel-2: #1d212c;
  --border: #2a2f3c;
  --text: #e6e8eb;
  --muted: #888d99;
  --accent: #4ea8de;
  --ok: #3ecf8e;
  --down: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}
.container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px;
}
h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
h1 span { color: var(--accent); }
.meta { color: var(--muted); font-size: 13px; }
.search {
  margin-bottom: 32px;
  width: 100%;
  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  padding: 12px 16px; border-radius: 8px; font-size: 15px;
  font-family: inherit;
}
.search:focus { outline: none; border-color: var(--accent); }
.section { margin-bottom: 40px; }
.section-title {
  font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 12px;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
}
.card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; text-decoration: none; color: inherit;
  display: block; transition: all 0.12s ease; position: relative;
}
.card:hover { background: var(--panel-2); border-color: var(--accent); transform: translateY(-1px); }
.card .head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--ok); box-shadow: 0 0 6px currentColor;
}
.dot.down { background: var(--down); }
.name { font-weight: 600; font-size: 14px; flex: 1; }
.host { color: var(--muted); font-size: 12px; }
.desc { color: var(--muted); font-size: 13px; }
.card.hide { display: none; }
.section.empty { display: none; }
footer {
  margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border);
  color: var(--muted); font-size: 12px; text-align: center;
}
</style>
</head>

  <div id="content"></div>
  <footer>

const SECTION_ORDER = ['fediverse','comms','media','tools','infra','auth','world'];
const SECTION_LABELS = {
  fediverse: 'Fediverse',
  comms: 'Communications',
  media: 'Media',
  tools: 'Tools',
  infra: 'Infrastructure',
  auth: 'Identity',
  world: 'World'
};

function render(filter) {
  const f = (filter || '').trim().toLowerCase();
  const content = document.getElementById('content');
  content.innerHTML = '';
  let total = 0, shown = 0;

  const groups = {};
  for (const s of SITES) {
    total++;
    (groups[s.cat] = groups[s.cat] || []).push(s);
  }

  for (const cat of SECTION_ORDER) {
    const items = groups[cat];
    if (!items) continue;
    items.sort((a, b) => a.name.localeCompare(b.name));
    const visible = items.filter(s =>
      !f || s.name.toLowerCase().includes(f) || s.desc.toLowerCase().includes(f) || s.url.toLowerCase().includes(f)
    );
    if (!visible.length) continue;
    shown += visible.length;
    const sec = document.createElement('div');
    sec.className = 'section';
    const host = u => u.replace(/^https?:\/\//, '').replace(/\/$/, '');
    sec.innerHTML = `<div class="section-title">${SECTION_LABELS[cat] || cat}</div>
      <div class="grid">${visible.map(s => `
        <a class="card" href="${s.url}" target="_blank" rel="noopener">
          <div class="head">
            <span class="dot ${s.status === 'down' ? 'down' : ''}"></span>
            <span class="name">${s.name}</span>
          </div>
          <div class="desc">${s.desc}</div>
          <div class="host">${host(s.url)}</div>
        </a>`).join('')}</div>`;
    content.appendChild(sec);
  }
  document.getElementById('count').textContent = f ? `${shown}/${total}` : total;
}

document.getElementById('q').addEventListener('input', e => render(e.target.value));
render('');

function tick() {
  const d = new Date();
  const z = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    `${d.getUTCFullYear()}-${z(d.getUTCMonth()+1)}-${z(d.getUTCDate())} ${z(d.getUTCHours())}:${z(d.getUTCMinutes())} UTC`;
}
tick(); setInterval(tick, 30000);
</script>
