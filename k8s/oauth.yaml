apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-oauth
  namespace: homepage
spec:
  replicas: 2
  selector:
    matchLabels: {app: homepage-oauth}
  template:
    metadata:
      labels: {app: homepage-oauth}
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        args:
        - --http-address=0.0.0.0:4180
        - --provider=keycloak-oidc
        - --redirect-url=https://holm.team/oauth2/callback
        - --oidc-issuer-url=https://auth.holm.team/realms/holm
        - --upstream=http://homepage.homepage.svc.cluster.local:80
        - --cookie-domain=.holm.team
        - --cookie-secure=true
        - --cookie-samesite=lax
        - --whitelist-domain=.holm.team
        - --email-domain=*
        - --skip-provider-button=true
        - --oidc-extra-audience=account
        - --pass-access-token=true
        - --pass-authorization-header=true
        - --set-authorization-header=true
        - --reverse-proxy=true
        env:
        - {name: OAUTH2_PROXY_CLIENT_ID,     valueFrom: {secretKeyRef: {name: homepage-oauth-secrets, key: client-id}}}
        - {name: OAUTH2_PROXY_CLIENT_SECRET, valueFrom: {secretKeyRef: {name: homepage-oauth-secrets, key: client-secret}}}
        - {name: OAUTH2_PROXY_COOKIE_SECRET, valueFrom: {secretKeyRef: {name: homepage-oauth-secrets, key: cookie-secret}}}
        ports:
        - {containerPort: 4180}
        resources:
          requests: {cpu: 10m, memory: 32Mi}
          limits:   {cpu: 200m, memory: 128Mi}
        readinessProbe:
          httpGet: {path: /ping, port: 4180}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-oauth
  namespace: homepage
spec:
  selector: {app: homepage-oauth}
  ports:
  - port: 80
    targetPort: 4180
